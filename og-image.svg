<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E2D40"/>

  <!-- Blueprint grid overlay -->
  <defs>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.08"/>
    </pattern>
    <radialGradient id="glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top pill badge -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="340" height="44" rx="22" fill="#1D9E75" fill-opacity="0.14" stroke="#1D9E75" stroke-opacity="0.32"/>
    <text x="170" y="29" text-anchor="middle" font-family="'Barlow', Arial, sans-serif" font-size="15" font-weight="600" fill="#1D9E75" letter-spacing="1.2">
      OPENSTAAD BOOTCAMP FOR EVERYONE
    </text>
  </g>

  <!-- Main headline -->
  <text x="80" y="240" font-family="'Barlow Condensed', Arial, sans-serif" font-size="76" font-weight="700" fill="#FFFFFF">
    Stop doing manually
  </text>
  <text x="80" y="330" font-family="'Barlow Condensed', Arial, sans-serif" font-size="76" font-weight="700" fill="#FFFFFF">
    what <tspan fill="#1D9E75" font-style="italic">OpenSTAAD</tspan> can
  </text>
  <text x="80" y="420" font-family="'Barlow Condensed', Arial, sans-serif" font-size="76" font-weight="700" fill="#FFFFFF">
    do for you.
  </text>

  <!-- Subtitle -->
  <text x="80" y="478" font-family="'Barlow', Arial, sans-serif" font-size="26" font-weight="500" fill="#FFFFFF" fill-opacity="0.6">
    Automate STAAD. Reclaim your time.
  </text>

  <!-- Bottom brand bar -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>

  <g transform="translate(80, 570)">
    <text x="0" y="20" font-family="'Barlow Condensed', Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="1">
      CODING FOR CIVIL ENGINEERS
    </text>
  </g>

  <text x="1120" y="590" text-anchor="end" font-family="'Barlow', Arial, sans-serif" font-size="18" font-weight="500" fill="#1D9E75">
    codingforcivilengineers.com
  </text>

  <!-- Accent corner element -->
  <g transform="translate(1000, 200)" opacity="0.85">
    <rect x="0" y="0" width="120" height="120" rx="10" fill="#0f1d2b" stroke="#1D9E75" stroke-opacity="0.3"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e"/>
    <circle cx="54" cy="18" r="5" fill="#28c840"/>
    <text x="16" y="58" font-family="Consolas, monospace" font-size="13" fill="#569cd6">using</text>
    <text x="16" y="78" font-family="Consolas, monospace" font-size="13" fill="#4ec9b0">OpenSTAAD</text>
    <text x="16" y="98" font-family="Consolas, monospace" font-size="13" fill="#dcdcaa">.Automate()</text>
  </g>
</svg>
